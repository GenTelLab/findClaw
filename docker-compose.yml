services:
  findclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - FINDCLAW_DATABASE_URL=postgresql+asyncpg://findclaw:${DB_PASSWORD:-findclaw123}@db:5432/findclaw
      - FINDCLAW_SERVER_PORT=8080
      - FINDCLAW_FINGERPRINT_EXTERNAL_PATH=/config/fingerprints.json
    volumes:
      - ./config:/config:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    cap_add:
      - NET_RAW

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=findclaw
      - POSTGRES_USER=findclaw
      - POSTGRES_PASSWORD=${DB_PASSWORD:-findclaw123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findclaw"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
